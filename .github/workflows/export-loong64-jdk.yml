name: Export loong64 JDK image

on:
  workflow_dispatch:
    inputs:
      jdk_tag:
        description: "cr.loongnix.cn/library/openjdk tag"
        required: true
        default: "8-buster"
        type: choice
        options:
          - 8-buster
          - 8-slim
          - 8-slim-buster
          - 8u352
          - 8u312b07-buster-slim
          - 11
          - 11-buster
          - 11-slim
          - 17
          - 17-buster
          - 17-slim
          - 21-buster
          - 21-slim

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-24.04
    env:
      JDK_TAG: ${{ inputs.jdk_tag }}
    steps:
      - name: Enable QEMU for loong64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: loong64

      - name: Pull loong64 JDK image
        run: docker pull cr.loongnix.cn/library/openjdk:${JDK_TAG}

      - name: Export image tar
        id: export
        run: |
          SAFE_TAG="${JDK_TAG//\//-}"
          TAR_NAME="openjdk-loong64-${SAFE_TAG}.tar"
          docker save -o "${TAR_NAME}" "cr.loongnix.cn/library/openjdk:${JDK_TAG}"
          ls -lh "${TAR_NAME}"
          echo "tar_name=${TAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "safe_tag=${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload JDK image tar
        uses: actions/upload-artifact@v4
        with:
          name: openjdk-loong64-${{ steps.export.outputs.safe_tag }}
          path: ${{ steps.export.outputs.tar_name }}
          if-no-files-found: error
          retention-days: 7
