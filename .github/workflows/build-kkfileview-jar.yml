name: Build kkFileView jar

on:
  workflow_dispatch:
    inputs:
      kkfileview_version:
        description: kkFileView release version
        required: true
        default: 4.4.0
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      RAW_VERSION: ${{ inputs.kkfileview_version || '4.4.0' }}
      SOURCE_URL: https://github.com/kekingcn/kkFileView.git
      PATCH_FILE: switch_office_preview_type.patch
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Set build metadata
        id: meta
        run: |
          set -euo pipefail

          VERSION_TAG="${RAW_VERSION#v}"
          SOURCE_REF="v${VERSION_TAG}"
          ARTIFACT_NAME="kkfileview-jar-${VERSION_TAG}"
          OUTPUT_JAR="kkFileView-${VERSION_TAG}.jar"

          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "SOURCE_REF=${SOURCE_REF}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"
          echo "OUTPUT_JAR=${OUTPUT_JAR}" >> "$GITHUB_ENV"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "output_jar=${OUTPUT_JAR}" >> "$GITHUB_OUTPUT"

      - name: Clone upstream source
        run: |
          set -euo pipefail

          git clone --depth 1 --branch "${SOURCE_REF}" "${SOURCE_URL}" upstream-kkfileview

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
          cache-dependency-path: upstream-kkfileview/server/pom.xml

      - name: Apply local patch
        run: |
          set -euo pipefail

          cd upstream-kkfileview
          git apply "${GITHUB_WORKSPACE}/${PATCH_FILE}"

      - name: Build kkFileView jar
        run: |
          set -euo pipefail

          cd upstream-kkfileview
          mvn -B -ntp clean package -DskipTests -f server/pom.xml
          cp server/target/kkFileView-*.jar "${GITHUB_WORKSPACE}/${OUTPUT_JAR}"

      - name: Verify artifact
        run: |
          set -euo pipefail

          test -f "${OUTPUT_JAR}"
          ls -lh "${OUTPUT_JAR}"

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.output_jar }}
          if-no-files-found: error
          retention-days: 7
