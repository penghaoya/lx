name: Build kkFileView loong64 image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-kkfileview-loong64.yml
      - Dockerfile.loong64
      - Makefile
      - switch_office_preview_type.patch
      - .gitignore
      - README.md
  workflow_dispatch:
    inputs:
      kkfileview_version:
        description: kkFileView release version
        required: true
        default: 4.4.0
        type: string
      build_mode:
        description: Build from source or download a published release jar
        required: true
        default: source
        type: choice
        options:
          - source
          - release
      release_jar_url:
        description: Optional custom release jar URL, only used when build_mode=release
        required: false
        default: ""
        type: string
      base_image:
        description: Base image for the loong64 runtime image
        required: true
        default: cr.loongnix.cn/library/openjdk:8-buster
        type: string
      office_packages:
        description: Optional apt packages for LibreOffice runtime, e.g. "libreoffice" or "libreoffice-core libreoffice-writer"
        required: false
        default: ""
        type: string
      image_name:
        description: Output Docker image name
        required: true
        default: kkfileview
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      RAW_VERSION: ${{ inputs.kkfileview_version || '4.4.0' }}
      BUILD_MODE: ${{ inputs.build_mode || 'source' }}
      RELEASE_JAR_URL: ${{ inputs.release_jar_url || '' }}
      BASE_IMAGE: ${{ inputs.base_image || 'cr.loongnix.cn/library/openjdk:8-buster' }}
      OFFICE_PACKAGES: ${{ inputs.office_packages || '' }}
      IMAGE_NAME: ${{ inputs.image_name || 'kkfileview' }}
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Set artifact names
        id: meta
        run: |
          set -euo pipefail

          VERSION_TAG="${RAW_VERSION#v}"

          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_NAME}:loong64-${VERSION_TAG}" >> "$GITHUB_ENV"
          echo "TAR_NAME=${IMAGE_NAME}-loong64-${VERSION_TAG}.tar" >> "$GITHUB_ENV"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "tar_name=${IMAGE_NAME}-loong64-${VERSION_TAG}.tar" >> "$GITHUB_OUTPUT"

      - name: Enable QEMU for loong64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: loong64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export via Makefile
        run: |
          VERSION_TAG="${VERSION_TAG}"
          RELEASE_URL="${RELEASE_JAR_URL}"
          if [ -z "${RELEASE_URL}" ]; then
            RELEASE_URL="https://github.com/kekingcn/kkFileView/releases/download/v${VERSION_TAG}/kkFileView-${VERSION_TAG}.jar"
          fi

          make export \
            TAG="${VERSION_TAG}" \
            BUILD_MODE="${BUILD_MODE}" \
            RELEASE_JAR_URL="${RELEASE_URL}" \
            BASE_IMAGE="${BASE_IMAGE}" \
            OFFICE_PACKAGES="${OFFICE_PACKAGES}" \
            REPOSITORY="${IMAGE_NAME}" \
            LOCAL_IMAGE="${IMAGE_TAG}" \
            TAR_NAME="${TAR_NAME}"

      - name: Upload offline image tar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-loong64-${{ steps.meta.outputs.version_tag }}
          path: ${{ steps.meta.outputs.tar_name }}
          if-no-files-found: error
          retention-days: 7
