name: Export loongnix images

on:
  workflow_dispatch:
    inputs:
      images:
        description: >
          Images to export, one per line: image:tag
        required: true
        default: |-
          cr.loongnix.cn/library/openjdk:8-buster
          cr.loongnix.cn/portainer/portainer-ce:latest
        type: string

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Parse image list into matrix
        id: parse
        env:
          IMAGES: ${{ inputs.images }}
        run: |
          MATRIX=$(echo "${IMAGES}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' | jq -R -s -c '[split("\n")[] | select(length>0) | {ref: .}]')
          echo "matrix={\"include\":${MATRIX}}" >> "$GITHUB_OUTPUT"

  export:
    needs: prepare
    runs-on: ubuntu-24.04
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Enable QEMU for loong64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: loong64

      - name: Pull and export image
        id: export
        run: |
          REF="${{ matrix.ref }}"
          docker pull "${REF}"
          # 解析 image 和 tag
          IMAGE="${REF%%:*}"
          TAG="${REF#*:}"
          [ "${TAG}" = "${IMAGE}" ] && TAG="latest"
          NAME="${IMAGE##*/}"
          SAFE_TAG="${TAG//\//-}"
          TAR_NAME="${NAME}-loong64-${SAFE_TAG}.tar"
          docker save -o "${TAR_NAME}" "${REF}"
          ls -lh "${TAR_NAME}"
          echo "tar_name=${TAR_NAME}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${NAME}-loong64-${SAFE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.export.outputs.artifact_name }}
          path: ${{ steps.export.outputs.tar_name }}
          if-no-files-found: error
          retention-days: 7
